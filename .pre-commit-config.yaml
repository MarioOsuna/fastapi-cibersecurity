repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        exclude: ^alembic/
        additional_dependencies:
          - pydantic>=2.7.0
          - pydantic-settings>=2.3.0
          - sqlalchemy[mypy]>=2.0.30
          - types-redis>=4.6.0
          - fastapi>=0.115.0
          - redis[hiredis]>=5.0.0
          - structlog>=24.1.0
